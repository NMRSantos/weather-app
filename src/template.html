<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="content">
      <div id="inner-div">
        <form id="form">
          <input type="text" required placeholder="Country of city name..." />
          <button id="submit">Submit</button>
        </form>
        <div id="output">
          <p class="location" id="location"></p>
          <p class="temperature" id="current"></p>
          <p class="temperature" id="min"></p>
          <p class="temperature" id="max"></p>
        </div>
      </div>
      <div>
        <button id="toggle">Toggle Celcius</button>
      </div>
    </div>
  </body>
</html>
